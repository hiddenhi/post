<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表单提交</title>
  <style>
    .box { width: 320px; margin: 50px auto; }
    .item { margin:10px 0; }
    input { width:100%; padding:8px; box-sizing:border-box; }
    button { width:100%; padding:10px; background:#007bff; color:#fff; border:none; cursor:pointer; }
    button:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="item">
    <input type="text" id="name" placeholder="请输入姓名" required>
  </div>
  <div class="item">
    <input type="tel" id="phone" placeholder="请输入手机号" required>
  </div>
  <button id="submitBtn">提交</button>
  <div id="tip" style="margin-top:12px"></div>
</div>

<script>
const btn = document.getElementById('submitBtn')
const tip = document.getElementById('tip')
let isLoading = false

btn.onclick = async () => {
  // 请求进行中，直接拦截
  if (isLoading) return

  const name = document.getElementById('name').value.trim()
  const phone = document.getElementById('phone').value.trim()
  tip.innerText = ''

  // 表单校验：未填写完整禁止提交
  if (!name) {
    tip.style.color = 'red'
    tip.innerText = '请输入姓名'
    return
  }
  if (!phone) {
    tip.style.color = 'red'
    tip.innerText = '请输入手机号'
    return
  }

  // 校验通过，开始请求
  isLoading = true
  btn.disabled = true
  btn.innerText = '提交中...'

  try {
    const res = await fetch('/api/submit', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ name, phone })
    })
    const data = await res.json()
    if (data.code === 200) {
      tip.style.color = 'green'
      tip.innerText = data.msg
      // 清空输入框
      document.getElementById('name').value = ''
      document.getElementById('phone').value = ''
    } else {
      tip.style.color = 'red'
      tip.innerText = data.msg
    }
  } catch (e) {
    tip.style.color = 'red'
    tip.innerText = '网络请求失败'
  } finally {
    // 无论成功失败都恢复按钮
    isLoading = false
    btn.disabled = false
    btn.innerText = '提交'
  }
}
</script>
</body>
</html>
