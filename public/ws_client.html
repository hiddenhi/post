<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>表单数据接收客户端</title>
  <style>
    .item { padding: 8px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
<h3>实时表单提交记录</h3>
<div id="list"></div>

<script>
const list = document.getElementById("list");
let ws;

function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/wss`);

  ws.onopen = () => {
    console.log("WS连接成功，依靠底层协议Ping保活");
  };

  ws.onmessage = (e) => {
    const res = JSON.parse(e.data);
    if (res.type === "form_data") {
      const d = res.data;
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `姓名：${d.name}，手机号：${d.phone}，提交时间：${d.time}`;
      list.prepend(div);
    }
  };

  ws.onclose = () => {
    console.log("连接断开，3秒后自动重连");
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

connectWS();
</script>
</body>
</html>
